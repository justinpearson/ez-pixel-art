<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ez-pixel-art</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="toolbar">
    <a class="brand" href="https://github.com/justinpearson/ez-pixel-art" target="_blank" rel="noopener" title="View source on GitHub">ez-pixel-art</a>

    <div class="group">
      <button id="btn-new" title="New image (N)"><b>N</b>ew</button>
      <button id="btn-open" title="Open image (O)"><b>O</b>pen</button>
      <input type="file" id="file-input" accept="image/png,image/jpeg,image/bmp,image/*" hidden />
      <button id="btn-save" title="Save image (V, Cmd/Ctrl+S)">Sa<b>v</b>e</button>
      <select id="save-format" title="Save format">
        <option value="png">PNG</option>
        <option value="jpg">JPG</option>
        <option value="bmp">BMP</option>
      </select>
    </div>

    <div class="group" id="select-tool-group">
      <button class="tool-btn" data-tool="select" title="Select (S) — drag to select; Delete clears selected pixels; Esc dismisses"><b>S</b>elect</button>
      <label>Mode
        <select id="selection-mode" title="How the Select tool interprets clicks/drags">
          <option value="rect">Rectangle</option>
          <option value="row">Row</option>
          <option value="column">Column</option>
          <option value="contiguous">Contiguous color</option>
          <option value="same-color">Same color</option>
        </select>
      </label>
      <button id="btn-crop-selection" title="Crop the canvas to the bounding box of the current selection (C)" disabled><b>C</b>rop to Selection</button>
      <button id="btn-fill-selection" title="Fill selected pixels with current color (Enter)" disabled>Fill Selection</button>
    </div>

    <div class="group">
      <button id="btn-undo" title="Undo (Z, Cmd/Ctrl+Z)"><b>z</b> Undo</button>
      <button id="btn-redo" title="Redo (X, Cmd/Ctrl+Shift+Z)"><b>x</b> Redo</button>
    </div>

    <div class="group">
      <button id="btn-crop"   title="Auto-Crop away the uniform background border (Y)">Auto-Crop (<b>y</b>)</button>
    </div>

    <div class="group" id="zoom-group">
      <label>Zoom <input type="number" id="zoom-input" min="1" max="64" step="1" value="16" title="Zoom level (− / =)" /></label>
      <label class="check"><input type="checkbox" id="grid-toggle" /><span><b>G</b>rid</span></label>
      <label class="check"><input type="checkbox" id="alpha-preview" /><span><b>a</b>lpha preview</span></label>
      <label class="check" title="Recolor each distinct RGBA in the image with a high-contrast hue so similar colors are easy to tell apart. View-only — does not edit the image. (T)"><input type="checkbox" id="distinct-preview" /><span>distinc<b>t</b> colors</span></label>
    </div>

    <span id="status"></span>
  </header>

  <section id="draw-panel">
    <header id="draw-header">
      <button id="btn-draw-toggle" type="button" class="panel-toggle" aria-expanded="true" title="Show / hide the Draw panel (D)">
        <span class="caret">▶</span>
        <span class="panel-title">Draw</span>
      </button>
      <span id="draw-summary"></span>
    </header>
    <div id="draw-body">
      <div class="group" id="tools">
        <button class="tool-btn active" data-tool="pencil" title="Pencil (P)"><b>P</b>encil</button>
        <button id="btn-eraser" class="tool-btn" data-tool="eraser" title="Eraser (E) — paints transparent pixels"><b>E</b>raser</button>
        <button class="tool-btn" data-tool="line"   title="Line (L) — drag to draw; Esc to cancel"><b>L</b>ine</button>
        <button class="tool-btn" data-tool="rect"   title="Rectangle (R) — drag to draw; Esc to cancel"><b>R</b>ect</button>
        <button class="tool-btn" data-tool="fill"   title="Fill (F)"><b>F</b>ill</button>
      </div>

      <div class="group" id="shape-options">
        <label>Thickness <input type="number" id="shape-thickness" min="1" max="16" value="1" title="Brush / outline thickness (, and . adjust it)" /></label>
        <label class="check"><input type="checkbox" id="rect-filled" /><span>Filled</span></label>
      </div>

      <div class="group" id="color-section">
        <input type="color" id="current-color" value="#cb6e4a" title="Current color (RGB)" />
        <span class="alpha-control" title="Alpha (0 = transparent, 255 = opaque)">
          <span class="alpha-label">α</span>
          <input type="range" id="alpha-slider" min="0" max="255" value="255" />
          <input type="number" id="alpha-number" min="0" max="255" value="255" />
        </span>
        <div id="current-color-preview" class="swatch" title="Effective RGBA"></div>
        <span id="current-color-info" title="Current RGBA values">rgba(203, 110, 74, 255)</span>
        <button class="tool-btn" data-tool="picker" title="Eyedropper (K) — right-click on the canvas also picks">Pic<b>k</b></button>
      </div>
    </div>
  </section>

  <section id="resize-panel">
    <header id="resize-header">
      <button id="btn-resize-toggle" type="button" class="panel-toggle" aria-expanded="false" title="Show / hide the Image Resize panel (I)">
        <span class="caret">▶</span>
        <span class="panel-title"><b>I</b>mage Resize</span>
      </button>
      <span id="resize-summary"></span>
    </header>
    <div id="resize-body" class="hidden">
      <div class="resize-controls">
        <label>Resize by
          <select id="resize-mode" title="Choose what the W/H inputs mean">
            <option value="output">Output size</option>
            <option value="pixel">Pixel size</option>
          </select>
        </label>
        <span id="resize-output-fields">
          <label>W <input type="number" id="resize-w" min="1" max="2048" value="32" /></label>
          <label>H <input type="number" id="resize-h" min="1" max="2048" value="32" /></label>
          <label class="check"><input type="checkbox" id="resize-keep-aspect" checked /> Lock aspect</label>
        </span>
        <span id="resize-pixel-fields" class="hidden" title="Size of one resized pixel, measured in current pixels">
          <label>Pixel W <input type="number" id="resize-px-w" min="1" max="2048" value="5" /></label>
          <label>Pixel H <input type="number" id="resize-px-h" min="1" max="2048" value="5" /></label>
          <label class="check"><input type="checkbox" id="resize-px-keep-aspect" checked /> Lock aspect</label>
        </span>
        <label>Shift X <input type="number" id="resize-shift-x" value="0" /></label>
        <label>Shift Y <input type="number" id="resize-shift-y" value="0" /></label>
        <button id="btn-resize-apply" title="Commit the resize (collapses the panel). Press Esc or click the header to cancel.">Apply</button>
      </div>
    </div>
  </section>

  <section id="quant-panel">
    <header id="quant-header">
      <button id="btn-quant-toggle" type="button" class="panel-toggle quant-toggle" aria-expanded="false" title="Show / hide the Color Quantization panel (Q)">
        <span class="caret">▶</span>
        <span class="quant-title">Color <b>Q</b>uantization</span>
      </button>
      <span id="quant-summary"></span>
    </header>
    <div id="quant-body" class="hidden">
      <div class="quant-section" id="quant-kmeans-section">
        <div class="quant-section-header">
          <h4>K-means clusters (LAB color space)</h4>
          <label class="check" title="Checked: each proposed cluster color is snapped to the closest existing pixel-set, preserving real image colors and alpha. Unchecked: the raw cluster centroid color is used (synthetic, alpha forced to 255).">
            <input type="checkbox" id="kmeans-snap" checked />
            Snap centroids to closest pixel-set
          </label>
        </div>
        <table id="kmeans-table">
          <thead>
            <tr>
              <th></th>
              <th>k</th>
              <th title="Root-mean-square LAB distance per pixel from its cluster centroid. Lower = better fit.">Mean ΔE / px</th>
              <th>Proposed colors</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="quant-section" id="quant-pixelsets-section">
        <div class="quant-section-header">
          <h4>Pixel sets</h4>
          <span id="pixel-sets-summary"></span>
        </div>
        <div id="pixel-sets-table-wrap">
          <table id="pixel-sets-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Color</th>
                <th>RGBA</th>
                <th>Count</th>
                <th>Select</th>
                <th>Replace with</th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
      <div id="quant-actions">
        <button id="btn-quantize" title="Apply every row's chosen replacement in one atomic pass.">Quantize (apply all replacements)</button>
      </div>
    </div>
  </section>

  <main>
    <div id="canvas-wrap">
      <div id="canvas-stage" class="checker">
        <canvas id="art"></canvas>
        <canvas id="art-alpha-preview" class="hidden"></canvas>
        <canvas id="art-distinct-preview" class="hidden"></canvas>
        <canvas id="hover-overlay"></canvas>
        <canvas id="selection-overlay"></canvas>
        <canvas id="resize-grid-overlay"></canvas>
        <div id="grid-overlay" class="grid hidden"></div>
      </div>
    </div>
  </main>

  <dialog id="new-dialog">
    <form method="dialog">
      <h3>New image</h3>
      <label>Width  <input type="number" id="new-w" min="1" max="2048" value="32" /></label>
      <label>Height <input type="number" id="new-h" min="1" max="2048" value="32" /></label>
      <div class="actions">
        <button value="cancel">Cancel</button>
        <button value="ok" id="new-ok">Create</button>
      </div>
    </form>
  </dialog>

  <dialog id="import-dialog">
    <form method="dialog">
      <h3>Import image</h3>
      <div class="import-body">
        <div class="preview-wrap">
          <canvas id="import-preview-img"></canvas>
          <canvas id="import-preview-grid"></canvas>
        </div>
        <div class="import-controls">
          <p>Original: <span id="import-orig"></span></p>
          <label>Width  <input type="number" id="import-w" min="1" max="2048" /></label>
          <label>Height <input type="number" id="import-h" min="1" max="2048" /></label>
          <label class="check"><input type="checkbox" id="import-keep-aspect" checked /> Lock aspect</label>
          <p class="hint">The grid shows how source pixels map to output pixels.</p>
        </div>
      </div>
      <div class="actions">
        <button value="cancel">Cancel</button>
        <button value="ok" id="import-ok">Import</button>
      </div>
    </form>
  </dialog>

  <script>
    // Cache-bust the main script during local development so a stale copy
    // in the browser's HTTP cache doesn't shadow recent edits. The static
    // server emits no cache headers, so without this the browser may keep
    // serving an older app.js indefinitely after a normal reload.
    document.write('<script src="app.js?_t=' + Date.now() + '"><\/script>');
  </script>
</body>
</html>
